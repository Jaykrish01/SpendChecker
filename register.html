<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SpendChecker — Register</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0f14;
      --surface: #161920;
      --border:  #252933;
      --accent:  #7ee8a2;
      --accent2: #56cfe1;
      --text:    #e8eaf0;
      --muted:   #6b7280;
      --danger:  #f87171;
      --radius:  14px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .bg-blob {
      position: fixed; border-radius: 50%;
      filter: blur(80px); opacity: 0.18; pointer-events: none;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .blob1 { width: 420px; height: 420px; background: var(--accent2); top: -100px; right: -100px; animation-delay: 0s; }
    .blob2 { width: 300px; height: 300px; background: var(--accent);  bottom: -60px; left: -60px; animation-delay: -4s; }
    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(30px,25px) scale(1.08); }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 44px 40px 40px;
      width: 380px;
      position: relative; z-index: 1;
      animation: slideUp 0.55s cubic-bezier(.22,.68,0,1.2) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px) scale(.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .brand-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px; display: grid; place-items: center; font-size: 18px;
    }
    .brand-name { font-family: 'DM Serif Display', serif; font-size: 22px; letter-spacing: -0.3px; }

    h1 { font-family: 'DM Serif Display', serif; font-size: 26px; font-weight: 400; margin-bottom: 6px; letter-spacing: -0.4px; }
    .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 28px; }

    label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 7px; }
    .field { margin-bottom: 18px; }

    input {
      width: 100%; padding: 11px 14px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(126,232,162,0.12); }
    input::placeholder { color: var(--muted); }

    /* password strength bar */
    .strength-bar { height: 3px; border-radius: 2px; background: var(--border); margin-top: 8px; overflow: hidden; }
    .strength-fill { height: 100%; width: 0; border-radius: 2px; transition: width 0.3s, background 0.3s; }

    .btn {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #0d0f14; border: none; border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700;
      cursor: pointer; letter-spacing: 0.3px;
      transition: opacity 0.2s, transform 0.15s; margin-top: 4px;
    }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .divider { text-align: center; color: var(--muted); font-size: 12px; margin: 18px 0 4px; }
    .link-btn {
      display: block; text-align: center; color: var(--accent);
      font-size: 13px; font-weight: 500; text-decoration: none;
      padding: 8px; border-radius: var(--radius); transition: background 0.2s;
    }
    .link-btn:hover { background: rgba(126,232,162,0.08); }

    .msg { margin-top: 14px; padding: 10px 14px; border-radius: 10px; font-size: 13px; font-weight: 500; display: none; }
    .msg.error   { background: rgba(248,113,113,0.12); color: var(--danger);  border: 1px solid rgba(248,113,113,0.25); display: block; }
    .msg.success { background: rgba(126,232,162,0.1);  color: var(--accent);  border: 1px solid rgba(126,232,162,0.25); display: block; }
  </style>
</head>
<body>
  <div class="bg-blob blob1"></div>
  <div class="bg-blob blob2"></div>

  <div class="card">
    <div class="brand">
      <div class="brand-icon">💸</div>
      <span class="brand-name">SpendChecker</span>
    </div>

    <h1>Create account</h1>
    <p class="subtitle">Start tracking your expenses today</p>

    <div class="field">
      <label>Username</label>
      <input id="username" type="text" placeholder="pick a username" autocomplete="username"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input id="password" type="password" placeholder="min. 6 characters"
             oninput="checkStrength(this.value)" autocomplete="new-password"/>
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
    </div>

    <button class="btn" id="regBtn" onclick="register()">Create Account</button>

    <div class="divider">Already have an account?</div>
    <a href="/" class="link-btn">Sign in instead</a>

    <div class="msg" id="msg"></div>
  </div>

  <script>
    function checkStrength(val) {
      const fill = document.getElementById("strengthFill");
      let score = 0;
      if (val.length >= 6)  score++;
      if (val.length >= 10) score++;
      if (/[A-Z]/.test(val) && /[0-9]/.test(val)) score++;
      const colors = ["#f87171","#fbbf24","#7ee8a2"];
      const widths  = ["33%","66%","100%"];
      fill.style.width      = val.length ? widths[Math.min(score,2)] : "0";
      fill.style.background = val.length ? colors[Math.min(score,2)] : "transparent";
    }

    async function register() {
      const btn = document.getElementById("regBtn");
      const msg = document.getElementById("msg");
      msg.className = "msg";
      msg.textContent = "";

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      if (!username || !password) {
        msg.textContent = "Please fill in both fields.";
        msg.className = "msg error"; return;
      }
      if (password.length < 6) {
        msg.textContent = "Password must be at least 6 characters.";
        msg.className = "msg error"; return;
      }

      btn.disabled = true; btn.textContent = "Creating…";

      try {
        const res  = await fetch("/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (res.ok) {
          msg.textContent = data.message + " Redirecting to login…";
          msg.className = "msg success";
          setTimeout(() => window.location.href = "/", 1400);
        } else {
          msg.textContent = data.message || "Registration failed.";
          msg.className = "msg error";
        }
      } catch {
        msg.textContent = "Network error. Please try again.";
        msg.className = "msg error";
      } finally {
        btn.disabled = false; btn.textContent = "Create Account";
      }
    }
  </script>
</body>
</html>
